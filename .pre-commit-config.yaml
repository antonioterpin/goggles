exclude: ^pyproject\.toml$

repos:
  # Ruff: lint + format (single source of truth; rules live in pyproject.toml)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.1
    hooks:
      - id: ruff
        stages: [pre-commit, pre-push]
        # No --fix: fail loudly on violations (including RUF100).
        # Run `uv run ruff check --fix .` manually to auto-fix.

      - id: ruff-format
        stages: [pre-commit, pre-push]

  # Pydoclint: docstring/signature consistency (see pyproject.toml)
  - repo: local
    hooks:
      - id: pydoclint
        name: pydoclint
        entry: uv run pydoclint
        language: system
        types: [python]
        stages: [pre-commit, pre-push]

  # Generic hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # Expensive checks: only run on push (type-checking and the test suite).
  - repo: local
    hooks:
      - id: basedpyright
        name: basedpyright
        entry: uv run basedpyright
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
